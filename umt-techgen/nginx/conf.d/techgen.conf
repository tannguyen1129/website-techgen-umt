# ==========================================
# CÁC BIẾN & RATE LIMIT DÀNH CHO BẢO MẬT (ĐỂ NGOÀI BLOCK SERVER)
# Đảm bảo các dòng này nằm trong block http {} của cấu hình Nginx tổng
# ==========================================

# Khai báo biến nhận diện các request chứa Server Actions (RSC)
map $http_next_action $is_rsc_next {
    default  0;
    "~."     1;
}
map $http_rsc_action_id $is_rsc_action {
    default  0;
    "~."     1;
}
map "$is_rsc_next$is_rsc_action" $is_rsc {
    default  0;
    "~1"     1;
}

# Khởi tạo vùng nhớ giới hạn tốc độ (Rate Limit) cho các IP
limit_req_zone $binary_remote_addr zone=rsc_limit:10m rate=10r/s;

# ==========================================
# CẤU HÌNH SERVER
# ==========================================

server {
    listen 80;
    server_name techgen.umt.edu.vn;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name techgen.umt.edu.vn;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/techgen.umt.edu.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techgen.umt.edu.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Tăng giới hạn upload chung cho toàn server (Dành cho API)
    client_max_body_size 50M;

    # 1. API BACKEND
    location /api/ {
        proxy_pass http://umt-backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. ẢNH UPLOAD
    location /uploads/ {
        proxy_pass http://umt-backend:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. FRONTEND (NEXT.JS) - ĐÃ BỔ SUNG KHIÊN BẢO VỆ
    location / {
        # Giới hạn body size cực đại để chặn payload độc hại (Ghi đè mức 50M ở trên)
        client_max_body_size 128k;

        # Chặn ngay lập tức các User-Agent của tool scan lỗ hổng
        if ($http_user_agent ~* "(React2ShellScanner|Nuclei.*CVE-2025-55182)") {
            return 403;
        }

        # Áp dụng Rate Limit cho các request nghi ngờ là RSC
        limit_req zone=rsc_limit burst=5 nodelay;

        # Timeout ngắn: Ép ngắt kết nối nếu Node.js bị dính loop và treo quá 30 giây
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;

        # Cấu hình Proxy chuẩn
        proxy_pass http://umt-techgen-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}