# ==========================================
# CẤU HÌNH SERVER (ĐÃ BẬT LẠI CÁC RULE BẢO MẬT CHỐNG DOS)
# ==========================================

# Đánh dấu các request React Server Components / Server Actions.
map $http_next_action $is_rsc_next {
    default 0;
    "~."    1;
}

map $http_rsc_action_id $is_rsc_action {
    default 0;
    "~."    1;
}

map "$is_rsc_next$is_rsc_action" $is_rsc {
    default 0;
    "~1"    1;
}

# Chỉ áp rate limit cho request có header RSC. Các request thường dùng key rỗng nên không bị tính.
map $is_rsc $rsc_limit_key {
    default "";
    1       $binary_remote_addr;
}

limit_req_zone $rsc_limit_key zone=rsc_limit:10m rate=10r/s;

server {
    listen 80;
    server_name techgen.sontan.info;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name techgen.sontan.info;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/techgen.sontan.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techgen.sontan.info/privkey.pem;

    # Giữ giới hạn upload lớn cho API/backend, phần frontend sẽ siết riêng.
    client_max_body_size 50M;

    # Giảm thời gian treo kết nối khi upstream bị nghẽn.
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 10s;

    # Chặn các User-Agent scanner đã biết.
    if ($http_user_agent ~* "(React2ShellScanner|Nuclei.*CVE-2025-55182)") {
        return 403;
    }

    # 1. API BACKEND
    location /api/ {
        proxy_pass http://umt-backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. ẢNH UPLOAD
    location /uploads/ {
        proxy_pass http://umt-backend:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. FRONTEND (NEXT.JS) - TRẠNG THÁI: VULNERABLE
    location / {
        # Siết body size cho request vào frontend/Server Actions để giảm rủi ro RSC abuse.
        client_max_body_size 10M;

        # Rate limit áp cho request có header Next-Action / RSC-Action-Id.
        limit_req zone=rsc_limit burst=5 nodelay;

        # Cấu hình Proxy chuẩn chuyển tiếp trực tiếp vào Node.js
        proxy_pass http://umt-techgen-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
