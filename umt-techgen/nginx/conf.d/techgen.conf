server {
    listen 80;
    server_name techgen.umt.edu.vn;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name techgen.umt.edu.vn;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/techgen.umt.edu.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techgen.umt.edu.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Tăng giới hạn upload
    client_max_body_size 50M;

    # 1. API BACKEND
    location /api/ {
        proxy_pass http://umt-backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. ẢNH UPLOAD (SỬA LẠI ĐOẠN NÀY)
    location /uploads/ {
        proxy_pass http://umt-backend:4000/uploads/;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. FRONTEND
    location / {
        proxy_pass http://umt-techgen-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}
